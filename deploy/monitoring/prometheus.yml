global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    project: sgs-backend

scrape_configs:
  - job_name: sgs-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080   # dev local (Mac/Windows)
          # En GCP reemplazar por: 127.0.0.1:8080 (mismo host)
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: sgs-backend
