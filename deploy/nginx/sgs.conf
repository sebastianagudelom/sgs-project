server {
    listen 80;
    server_name sgsmarket.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sgsmarket.duckdns.org;

    # SSL - Let's Encrypt (certbot)
    ssl_certificate /etc/letsencrypt/live/sgsmarket.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sgsmarket.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Frontend Angular (archivos estaticos)
    root /var/www/sgs-frontend;
    index index.html;

    # Angular SPA - todas las rutas van a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy al backend Spring Boot
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # Archivos subidos (imagenes de productos)
    location /uploads/ {
        alias /opt/sgs/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Jenkins CI/CD
    location /jenkins/ {
        proxy_pass http://127.0.0.1:8090/jenkins/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # Grafana (acceso restringido por IP o basic auth en prod)
    location /grafana/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Descomenta para restringir por IP (recomendado en prod):
        # allow <TU_IP>;
        # deny all;
    }

    # Seguridad headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    client_max_body_size 5M;
}
