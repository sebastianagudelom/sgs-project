services:
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: sgs-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d   # 15 días de historial
      - --web.enable-lifecycle
    ports:
      - "127.0.0.1:9090:9090"               # Solo localhost, nginx lo proxea
    deploy:
      resources:
        limits:
          memory: 256m                       # Ajustado para e2-micro / e2-small

  grafana:
    image: grafana/grafana:11.0.0
    container_name: sgs-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:?Requerido - define GRAFANA_PASSWORD}"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3000:3000"               # Solo localhost, nginx lo proxea
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256m                       # Ajustado para e2-micro / e2-small

volumes:
  prometheus_data:
  grafana_data:
